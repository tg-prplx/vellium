name: Build Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    name: macOS (arm64 + x64)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pillow
        run: python -m pip install --upgrade pip pillow

      - name: Install dependencies
        run: npm ci

      - name: Build app bundles
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:mac

      - name: Build self-contained Whisper CLI runtimes
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch v1.9.1 https://github.com/ggml-org/whisper.cpp.git "$RUNNER_TEMP/whisper.cpp"
          mkdir -p release/local-runtimes
          for arch in arm64 x86_64; do
            cmake -S "$RUNNER_TEMP/whisper.cpp" -B "$RUNNER_TEMP/whisper-$arch" \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_OSX_ARCHITECTURES="$arch" \
              -DBUILD_SHARED_LIBS=OFF \
              -DWHISPER_BUILD_TESTS=OFF \
              -DWHISPER_BUILD_EXAMPLES=ON \
              -DGGML_METAL=OFF
            cmake --build "$RUNNER_TEMP/whisper-$arch" --config Release --target whisper-cli -j 3
            output_arch="$arch"
            if [ "$arch" = "x86_64" ]; then output_arch="x64"; fi
            stage="$RUNNER_TEMP/vellium-whisper-v1.9.1-macos-$output_arch"
            mkdir -p "$stage"
            cp "$RUNNER_TEMP/whisper-$arch/bin/whisper-cli" "$stage/whisper-cli"
            cp "$RUNNER_TEMP/whisper.cpp/LICENSE" "$stage/LICENSE"
            tar -C "$stage" -czf "release/local-runtimes/vellium-whisper-v1.9.1-macos-$output_arch.tar.gz" .
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: release/**/*
          if-no-files-found: error

  windows:
    name: Windows x64
    # Keep a stable MSVC toolchain for rebuilding better-sqlite3.
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pillow
        run: python -m pip install --upgrade pip pillow

      - name: Install dependencies
        run: npm ci

      - name: Build app bundles
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:win

      - name: Verify bundled plugins are packaged
        shell: pwsh
        run: |
          $plugin = "release/win-unpacked/resources/data/bundled-plugins/plugin-theme-catppuccin/plugin.json"
          if (-not (Test-Path $plugin)) {
            throw "Bundled plugin was not included in the Windows application package: $plugin"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release/**/*
          if-no-files-found: error

  linux:
    name: Linux x64 AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pillow
        run: python -m pip install --upgrade pip pillow

      - name: Install dependencies
        run: npm ci

      - name: Build AppImage bundle
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-appimage
          path: release/**/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows
      - linux
    if: startsWith(github.ref_name, 'v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare unique release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-upload
          while IFS= read -r file; do
            base="$(basename "$file")"
            if [ ! -f "release-upload/$base" ]; then
              cp "$file" "release-upload/$base"
            fi
          done < <(find release-assets -type f \( \
            -name "*.dmg" -o \
            -name "*.dmg.blockmap" -o \
            -name "*Setup*.exe" -o \
            -name "*Setup*.exe.blockmap" -o \
            -name "*.AppImage" -o \
            -name "*.AppImage.blockmap" -o \
            -name "vellium-whisper-*.tar.gz" -o \
            -name "latest.yml" -o \
            -name "latest-linux.yml" -o \
            -name "latest-mac.yml" -o \
            -name "latest-mac-arm64.yml" \
          \) | sort)
          ls -la release-upload
          test -n "$(ls -A release-upload)"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-upload/*
